<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>SyncWatch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0d0d14;
      --sf: #161622;
      --sf2: #1e1e2e;
      --br: #2a2a3d;
      --ac: #7c6dfa;
      --ac2: #fa6d9a;
      --tx: #eeeeff;
      --mu: #666680;
      --gr: #3dffa0;
      --rd: 12px;
    }

    html,
    body {
      width: 340px;
      height: 100vh;
      background: var(--bg);
      color: var(--tx);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .hdr {
      padding: 12px 14px;
      border-bottom: 1px solid var(--br);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      background: linear-gradient(135deg, var(--ac), var(--ac2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mu);
      transition: all .3s;
    }

    .dot.on {
      background: var(--gr);
      box-shadow: 0 0 8px var(--gr);
    }

    /* screens */
    .scr {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .scr.on {
      display: flex;
    }

    /* HOME */
    .home-body {
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar-wrap {
      position: relative;
      margin-bottom: 10px;
    }

    .av {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }

    .edit-av {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--sf2);
      border: 2px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .edit-av:hover {
      background: var(--br);
    }

    .uname {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .usub {
      font-size: 11px;
      color: var(--mu);
      margin-bottom: 22px;
    }

    /* edit name inline */
    .name-edit-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 20px;
      width: 100%;
    }

    .name-edit-row input {
      flex: 1;
      padding: 7px 10px;
      background: var(--sf2);
      border: 1px solid var(--br);
      border-radius: 8px;
      color: var(--tx);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      outline: none;
    }

    .name-edit-row input:focus {
      border-color: var(--ac);
    }

    .name-edit-row button {
      padding: 7px 12px;
      border-radius: 8px;
      background: var(--ac);
      border: none;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn {
      width: 100%;
      padding: 11px;
      border-radius: var(--rd);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-p {
      background: var(--ac);
      color: #fff;
      margin-bottom: 9px;
    }

    .btn-p:hover {
      background: #9181fc;
    }

    .btn-o {
      background: transparent;
      color: var(--tx);
      border: 1px solid var(--br);
    }

    .btn-o:hover {
      border-color: var(--ac);
      color: var(--ac);
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .div {
      text-align: center;
      color: var(--mu);
      font-size: 11px;
      margin: 0 0 9px;
      position: relative;
    }

    .div::before,
    .div::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--br);
    }

    .div::before {
      left: 0
    }

    .div::after {
      right: 0
    }

    /* FORM */
    .frm {
      padding: 18px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--mu);
      font-size: 11px;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .back:hover {
      color: var(--tx);
    }

    .fld {
      margin-bottom: 12px;
    }

    .lbl {
      display: block;
      font-size: 10px;
      color: var(--mu);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .inp {
      width: 100%;
      padding: 10px 12px;
      background: var(--sf2);
      border: 1px solid var(--br);
      border-radius: 10px;
      color: var(--tx);
      font-family: monospace;
      font-size: 15px;
      letter-spacing: 3px;
      outline: none;
      text-transform: uppercase;
    }

    .inp:focus {
      border-color: var(--ac);
    }

    .inp::placeholder {
      color: var(--mu);
      letter-spacing: 1px;
      font-size: 12px;
      text-transform: none;
    }

    .tc {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      background: var(--sf2);
      border-radius: 10px;
      border: 1px solid var(--br);
      margin-bottom: 12px;
    }

    .tct {
      font-size: 12px;
      font-weight: 500;
    }

    .tcs {
      font-size: 10px;
      color: var(--mu);
      margin-top: 1px;
    }

    .tog {
      position: relative;
      width: 38px;
      height: 21px;
      flex-shrink: 0;
    }

    .tog input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .sl {
      position: absolute;
      inset: 0;
      background: var(--br);
      border-radius: 20px;
      cursor: pointer;
      transition: background .2s;
    }

    .sl:before {
      content: '';
      position: absolute;
      width: 15px;
      height: 15px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }

    input:checked+.sl {
      background: var(--ac);
    }

    input:checked+.sl:before {
      transform: translateX(17px);
    }

    .err {
      color: #fa6d6d;
      font-size: 11px;
      margin-top: 5px;
    }

    /* ROOM */
    .rhdr {
      padding: 10px 13px;
      border-bottom: 1px solid var(--br);
      flex-shrink: 0;
    }

    .rr1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .rcode {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 4px;
      color: var(--ac);
      cursor: pointer;
    }

    .rcode:hover {
      color: var(--ac2);
    }

    .bdgs {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .bdg {
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
    }

    .bh {
      background: #7c6dfa22;
      color: var(--ac);
      border: 1px solid #7c6dfa44;
    }

    .bv {
      background: #fa6d9a22;
      color: var(--ac2);
      border: 1px solid #fa6d9a44;
    }

    .bm {
      background: #3dffa022;
      color: var(--gr);
      border: 1px solid #3dffa044;
    }

    .lvbtn {
      padding: 3px 9px;
      border-radius: 20px;
      background: transparent;
      color: #fa6d6d;
      border: 1px solid #fa6d6d33;
      font-size: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .lvbtn:hover {
      background: #fa6d6d15;
    }

    .rr2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .sind {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--mu);
    }

    .spulse {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gr);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .2
      }
    }

    .minfo {
      font-size: 10px;
      color: var(--mu);
    }

    .minfo b {
      color: var(--gr);
    }

    /* CHAT */
    .clist {
      flex: 1;
      overflow-y: auto;
      padding: 10px 11px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .clist::-webkit-scrollbar {
      width: 3px;
    }

    .clist::-webkit-scrollbar-thumb {
      background: var(--br);
      border-radius: 2px;
    }

    .smsg {
      text-align: center;
      font-size: 10px;
      color: var(--mu);
    }

    .smsg span {
      background: var(--sf2);
      padding: 2px 9px;
      border-radius: 20px;
      border: 1px solid var(--br);
    }

    .slink {
      text-align: center;
      padding: 7px 10px;
      background: var(--sf2);
      border-radius: 10px;
      border: 1px solid var(--br);
      margin: 2px 0;
    }

    .slink .sl-label {
      font-size: 9px;
      color: var(--mu);
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .slink a {
      color: var(--ac);
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      word-break: break-all;
    }

    .slink a:hover {
      text-decoration: underline;
    }

    .mrow {
      display: flex;
      gap: 7px;
      align-items: flex-end;
    }

    .mrow.me {
      flex-direction: row-reverse;
    }

    .mav {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      flex-shrink: 0;
      font-family: 'Syne', sans-serif;
      color: #fff;
    }

    .mcont {
      max-width: 74%;
    }

    .mname {
      font-size: 9px;
      color: var(--mu);
      margin-bottom: 2px;
      font-weight: 500;
    }

    .mrow.me .mname {
      text-align: right;
    }

    .mbub {
      padding: 7px 10px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }

    .mrow.other .mbub {
      background: var(--sf2);
      border-bottom-left-radius: 3px;
    }

    .mrow.me .mbub {
      background: var(--ac);
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .typing-bar {
      min-height: 18px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--mu);
      flex-shrink: 0;
    }

    .typing-dot {
      display: inline-flex;
      gap: 3px;
      align-items: center;
    }

    .typing-dot span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--mu);
      animation: tdot 1.2s infinite;
    }

    .typing-dot span:nth-child(2) {
      animation-delay: .2s;
    }

    .typing-dot span:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes tdot {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: .4
      }

      30% {
        transform: translateY(-4px);
        opacity: 1
      }
    }

    /* INPUT */
    .cftr {
      padding: 8px 10px;
      border-top: 1px solid var(--br);
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .cinp {
      flex: 1;
      padding: 8px 12px;
      background: var(--sf2);
      border: 1px solid var(--br);
      border-radius: 22px;
      color: var(--tx);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      outline: none;
    }

    .cinp:focus {
      border-color: var(--ac);
    }

    .cinp::placeholder {
      color: var(--mu);
    }

    .sbtn {
      width: 33px;
      height: 33px;
      border-radius: 50%;
      background: var(--ac);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }

    .sbtn:hover {
      background: #9181fc;
    }
  </style>
</head>

<body>

  <div class="hdr">
    <span class="logo">SyncWatch</span>
    <div style="display:flex;align-items:center;gap:14px;">
      <button id="btnForceSync" title="Sync Video" style="display:none;background:transparent;border:none;cursor:pointer;align-items:center;padding:0;transition:transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="url(#syncGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="syncGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#7c6dfa" />
              <stop offset="100%" stop-color="#fa6d9a" />
            </linearGradient>
          </defs>
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.34l-5.42 5.42"/>
        </svg>
      </button>
      <span class="dot" id="dot"></span>
    </div>
  </div>

  <!-- HOME -->
  <div class="scr on" id="sHome">
    <div class="home-body">
      <div class="avatar-wrap">
        <div class="av" id="bigAv">?</div>
        <div class="edit-av" id="editAvBtn" title="Edit name">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2.5">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
        </div>
      </div>
      <div class="uname" id="uname">...</div>
      <div class="usub">your watch party name</div>
      <div class="name-edit-row" id="nameEditRow" style="display:none">
        <input id="nameEditInp" maxlength="20" placeholder="New name..." />
        <button id="nameSaveBtn">Save</button>
      </div>
      <button class="btn btn-p" id="btnCreate2">+ Create room</button>
      <div class="div">or</div>
      <button class="btn btn-o" id="btnJoin2">Join a room</button>
    </div>
  </div>

  <!-- CREATE -->
  <div class="scr" id="sCreate">
    <div class="frm">
      <span class="back" id="bkCreate">← back</span>
      <div class="fld">
        <label class="lbl">Control Mode</label>
        <div class="tc">
          <div>
            <div class="tct">Host only</div>
            <div class="tcs">Only you control playback</div>
          </div>
          <label class="tog"><input type="checkbox" id="hostTog" /><span class="sl"></span></label>
        </div>
      </div>
      <button class="btn btn-p" id="btnDoCreate">Create room</button>
      <div class="err" id="cerr"></div>
    </div>
  </div>

  <!-- JOIN -->
  <div class="scr" id="sJoin">
    <div class="frm">
      <span class="back" id="bkJoin">← back</span>
      <div class="fld">
        <label class="lbl">Room Code</label>
        <input class="inp" id="joinInp" placeholder="6-char code..." maxlength="6" />
      </div>
      <button class="btn btn-p" id="btnDoJoin">Join room</button>
      <div class="err" id="jerr"></div>
    </div>
  </div>

  <!-- ROOM -->
  <div class="scr" id="sRoom">
    <div class="rhdr">
      <div class="rr1">
        <div class="rcode" id="rcode">------</div>
        <div class="bdgs">
          <span class="bdg bh" id="rbadge">host</span>
          <span class="bdg bm" id="mbadge">everyone</span>
          <button class="lvbtn" id="btnLeave">Leave</button>
        </div>
      </div>
      <div class="rr2">
        <div class="sind"><span class="spulse"></span><span id="stxt">Synced</span></div>
        <div class="minfo"><b id="mcnt">1</b> watching</div>
      </div>
    </div>
    <div class="clist" id="clist"></div>
    <div class="typing-bar" id="typingBar"></div>
    <div class="cftr">
      <input class="cinp" id="cinp" placeholder="Say something..." maxlength="200" />
      <button class="sbtn" id="sbtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z" />
        </svg>
      </button>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>

</html>
